<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tesouraria - RTC Cruz Alta</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1 class="titulo">
💰 Tesouraria
</h1>


<div class="lista">

<h3 style="color:#D61264;">
Olá, Associado
</h3>

<p style="color:#333;">
Confira suas cobranças pendentes:
</p>

</div>



<div class="lista">

<label style="color:#333;">

<input type="checkbox" 
class="pagamento"
value="35">

Mensalidade Julho/2026

<br>

<strong>R$ 35,00</strong>

</label>

</div>




<div class="lista">

<label style="color:#333;">

<input type="checkbox" 
class="pagamento"
value="50">

Almoço Rotary

<br>

<strong>R$ 50,00</strong>

</label>

</div>




<div class="lista">

<label style="color:#333;">

<input type="checkbox" 
class="pagamento"
value="80">

Camiseta RTC

<br>

<strong>R$ 80,00</strong>

</label>

</div>




<div class="lista">

<h3 style="color:#D61264;">
Total selecionado:
</h3>


<h2 style="color:#333;">
R$ <span id="total">0</span>,00
</h2>


</div>





<button class="botao" onclick="fazerPix()">

💳 Fazer PIX

</button>





<div class="lista" id="pix" style="display:none;">


<h3 style="color:#D61264;">
Pagamento PIX
</h3>


<p style="color:#333;">
Valor do pagamento:
</p>


<h2 style="color:#333;">
R$ <span id="valorPix">0</span>,00
</h2>




<img 

src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=00020126360014br.gov.bcb.pix0114629423120001715204000053039865802BR5923ROTARACT%20CLUB%20CRUZ%20ALTA6009CRUZ%20ALTA62070503***63046F40"

style="width:250px;display:block;margin:20px auto;"

>




<p style="color:#333;">
Código PIX:
</p>



<textarea 
id="codigoPix"
readonly
style="width:100%;height:120px;border-radius:10px;padding:10px;">

00020126360014br.gov.bcb.pix0114629423120001715204000053039865802BR5923ROTARACT CLUB CRUZ ALTA6009CRUZ ALTA62070503***63046F40

</textarea>




<button class="botao" onclick="copiarPix()">

📋 Copiar código PIX

</button>



<br><br>



<button class="botao" onclick="informarPagamento()">

✅ Já fiz o PIX

</button>



</div>





<a class="card" href="index.html">

⬅ Voltar

</a>



</div>





<script>


let caixas = document.querySelectorAll(".pagamento");

let total = 0;



caixas.forEach(function(caixa){


caixa.addEventListener("change",function(){


total = 0;


caixas.forEach(function(item){


if(item.checked){

total += Number(item.value);

}


});


document.getElementById("total").innerHTML = total;


});


});






function fazerPix(){


if(total==0){

alert("Selecione uma cobrança antes de fazer o PIX.");

return;

}


document.getElementById("pix").style.display="block";


document.getElementById("valorPix").innerHTML = total;


}






function copiarPix(){


let codigo = document.getElementById("codigoPix");


codigo.select();


navigator.clipboard.writeText(codigo.value.trim());


alert("Código PIX copiado!");



}






function informarPagamento(){


alert(

"Pagamento informado com sucesso!\n\nValor: R$ "+total+",00\n\nA tesouraria fará a conferência."

);


}



</script>



</body>

</html>
