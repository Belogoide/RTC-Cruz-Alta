<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tesouraria - RTC Cruz Alta</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1 class="titulo">
💰 Tesouraria
</h1>



<div class="lista">

<h3 style="color:#D61264;">
Olá, Associado
</h3>


<p style="color:#333;">
Confira suas cobranças pendentes:
</p>


</div>



<div id="cobrancas">


<p style="color:#333;text-align:center;">
Carregando cobranças...
</p>


</div>




<div class="lista">


<h3 style="color:#D61264;">
Total selecionado:
</h3>


<h2 style="color:#333;">
R$ <span id="total">0,00</span>
</h2>


</div>





<div class="espaco-botao">


<button class="botao" onclick="fazerPix()">



<img 

src="58d1e4c0d00fb74e2963c2b79e79f196.jpg"

style="
width:24px;
height:24px;
vertical-align:middle;
margin-right:8px;
"


>


Fazer PIX


</button>


</div>






<div class="lista" id="pix" style="display:none;">



<h3 style="color:#D61264;">


<img

src="58d1e4c0d00fb74e2963c2b79e79f196.jpg"

style="
width:38px;
height:38px;
vertical-align:middle;
margin-right:10px;
"

>


Pagamento PIX


</h3>




<p style="color:#333;">
Valor:
</p>


<h2>

R$ <span id="valorPix">0,00</span>

</h2>





<img

src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=00020126360014br.gov.bcb.pix0114629423120001715204000053039865802BR5923ROTARACT%20CLUB%20CRUZ%20ALTA6009CRUZ%20ALTA62070503***63046F40"

style="
width:250px;
display:block;
margin:20px auto;
"

>

<p style="color:#333;">
Código PIX:
</p>



<textarea id="codigoPix" readonly>

00020126360014br.gov.bcb.pix0114629423120001715204000053039865802BR5923ROTARACT CLUB CRUZ ALTA6009CRUZ ALTA62070503***63046F40

</textarea>




<button class="botao" onclick="copiarPix()">

📋 Copiar PIX

</button>



<br><br>



<button 
id="botaoPagamento"
class="botao" 
onclick="informarPagamento()">

✅ Já fiz o PIX

</button>



<br><br>



<button 
type="button" 
class="botao" 
onclick="fecharPix()">

❌ Cancelar

</button>



</div>





<div class="voltar">


<a class="card" href="index.html">

⬅ Voltar

</a>


</div>





</div>









<script>


const API = "https://script.google.com/macros/s/AKfycbzHAwc4EnLQzIsLAmq9dEYhZP5aQE3mPte-PP7E8TKQLF4I6S_fx_mqEHs_aectv1AMfg/exec";

const parametros = new URLSearchParams(
    window.location.search
);


const EMAIL_USUARIO =
parametros.get("email");


let total = 0;


fetch(API + "?email=" + EMAIL_USUARIO)


.then(res => res.json())


.then(dados => {



const area = document.getElementById("cobrancas");


area.innerHTML = "";



if(dados.length === 0){


area.innerHTML = `

<div class="lista">

<h3>
Nenhuma cobrança pendente
</h3>

</div>

`;

return;

}





dados.forEach(p => {



area.innerHTML += `


<div class="lista">


<label class="item-pagamento">



<input

type="checkbox"

class="pagamento"

value="${p.valor}"

data-item="${p.tipo} - ${p.descricao}"

onchange="atualizarTotal()"

>



<div>


<strong>

${p.tipo}

</strong>


<br>


<span>

${p.descricao}

</span>


<br>


<strong>

R$ ${Number(p.valor).toFixed(2).replace(".",",")}

</strong>


</div>


</label>


</div>



`;


});



})

.catch(erro=>{


console.log(erro);


document.getElementById("cobrancas").innerHTML =

"Erro ao carregar cobranças";


});







function atualizarTotal(){


total = 0;



document.querySelectorAll(".pagamento").forEach(item=>{


if(item.checked){


total += Number(item.value);


}


});



document.getElementById("total").innerHTML =

total.toFixed(2).replace(".",",");



}







function fazerPix(){


if(total == 0){


alert("Selecione uma cobrança antes de fazer o PIX.");


return;


}



document.getElementById("pix").style.display="block";



document.getElementById("valorPix").innerHTML =

total.toFixed(2).replace(".",",");



}






function copiarPix(){



let codigo = document.getElementById("codigoPix").value.trim();



navigator.clipboard.writeText(codigo);



alert("Código PIX copiado!");



}






let enviandoPagamento = false;


function informarPagamento(){


    if(enviandoPagamento){

        return;

    }


    let itens = [];


    document.querySelectorAll(".pagamento").forEach(item=>{


        if(item.checked){

            itens.push(item.dataset.item);

        }


    });



    if(itens.length == 0){

        alert("Selecione uma cobrança antes de informar o pagamento.");

        return;

    }



    enviandoPagamento = true;



    fetch(API, {

        method:"POST",

        body:JSON.stringify({

            acao:"registrarPagamento",

            email:"niltontadeufilho12610@gmail.com",

            itens:itens.join(" + "),

            valor:total

        })

    })



    .then(res=>res.json())


    .then(retorno=>{


        alert("Pagamento informado!\n\nA tesouraria fará a conferência.");


        fecharPix();


        enviandoPagamento = false;


    })



    .catch(erro=>{


        console.log(erro);


        alert("Erro ao informar pagamento.");


        enviandoPagamento = false;


    });



}

function fecharPix(){

    document.getElementById("pix").style.display="none";

}

</script>
