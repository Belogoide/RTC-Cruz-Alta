<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tesouraria - RTC Cruz Alta</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1 class="titulo">
💰 Tesouraria
</h1>


<div id="cobrancas">

<p style="color:white;text-align:center;">
Carregando cobranças...
</p>

</div>


<div id="pix" style="display:none;">


<div class="lista">


<h2 style="color:#D61264">
Pagamento PIX
</h2>


<p>
Valor selecionado:
</p>


<h2 id="valorPix">
R$ 0,00
</h2>


<div id="qrcode" style="margin:20px auto;"></div>


<p>
Código PIX:
</p>


<textarea id="codigoPix" 
style="width:100%;height:120px;border-radius:10px;padding:10px;"
readonly>
00020126360014br.gov.bcb.pix0114629423120001715204000053039865802BR5923ROTARACT CLUB CRUZ ALTA6009CRUZ ALTA62070503***63046F40
</textarea>


<button class="botao" onclick="copiarPix()">

📋 Copiar PIX

</button>


<button class="botao" onclick="informarPagamento()" style="margin-top:10px;">

✅ Informar pagamento realizado

</button>


</div>


</div>



<a class="card" href="index.html">

⬅ Voltar

</a>


</div>




<script>


const API = "https://script.google.com/macros/s/AKfycbzHAwc4EnLQzIsLAmq9dEYhZP5aQE3mPte-PP7E8TKQLF4I6S_fx_mqEHs_aectv1AMfg/exec";



let selecionados = [];

let emailAssociado = "niltontadeufilho12610@gmail.com";

let total = 0;



fetch(API)

.then(res=>res.json())

.then(dados=>{


const area = document.getElementById("cobrancas");


area.innerHTML="";



dados.forEach(p=>{


area.innerHTML += `


<div class="lista">


<label>


<input type="checkbox"
value="${p.valor}"
onchange="calcular(this,'${p.itens}',${p.valor})">


${p.itens}

<br>

R$ ${p.valor}


</label>


</div>


`;


});


});





function calcular(check,item,valor){


if(check.checked){


selecionados.push(item);

total += valor;


}else{


selecionados = selecionados.filter(x=>x != item);

total -= valor;


}


}



function abrirPix(){


if(total <= 0){

alert("Selecione uma cobrança");

return;

}


document.getElementById("pix").style.display="block";


document.getElementById("valorPix").innerHTML =

"R$ " + total.toFixed(2).replace(".",",");



}



function copiarPix(){


let texto=document.getElementById("codigoPix");


texto.select();


navigator.clipboard.writeText(texto.value);


alert("PIX copiado");


}




function informarPagamento(){


fetch(API,{


method:"POST",


body:JSON.stringify({


acao:"registrarPagamento",


email:emailAssociado,


itens:selecionados.join(" + "),


valor:total


})


})


.then(res=>res.json())


.then(retorno=>{


alert(retorno.status);


});



}



</script>


</body>

</html>
