<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin RTC</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1 class="titulo">
🧾 Admin RTC
</h1>



<div class="lista">


<h3 style="color:#D61264;">
👥 Associados
</h3>


<p>
Selecione os associados para receber a cobrança:
</p>


<div id="associados">

Carregando associados...

</div>


</div>





<div class="lista">


<h3 style="color:#D61264;">
📄 Nova cobrança
</h3>



<label>
Tipo
</label>


<input 
id="tipo"
class="input"
placeholder="Ex: Mensalidade">



<br><br>



<label>
Descrição
</label>


<input 
id="descricao"
class="input"
placeholder="Ex: Mensalidade Julho/2026">



<br><br>



<label>
Valor
</label>


<input 
id="valor"
class="input"
type="number"
placeholder="50.00">



<br><br>



<button 
class="botao"
onclick="criarCobranca()">

➕ Criar cobrança

</button>


</div>




<div class="lista">


<h3 style="color:#D61264;">
📌 Resultado
</h3>


<div id="resultado">

Nenhuma ação realizada.

</div>


</div>



</div>
<script>


const API = "https://script.google.com/macros/s/AKfycbzHAwc4EnLQzIsLAmq9dEYhZP5aQE3mPte-PP7E8TKQLF4I6S_fx_mqEHs_aectv1AMfg/exec";


let listaAssociados = [];



// BUSCAR ASSOCIADOS

fetch(API + "?tipo=associados")


.then(res => res.json())


.then(dados => {


    console.log("Associados:", dados);


    listaAssociados = dados;


    const area = document.getElementById("associados");


    area.innerHTML = "";



    if(dados.length == 0){


        area.innerHTML = "Nenhum associado encontrado";


        return;


    }





    dados.forEach(a => {



        area.innerHTML += `


        <div class="lista">


        <label>


        <input

        type="checkbox"

        class="usuario"

        value="${a.email}"

        >



        <strong>

        ${a.nome}

        </strong>


        <br>


        <small>

        ${a.email}

        </small>


        </label>


        </div>


        `;



    });



})


.catch(erro=>{


console.log(erro);


document.getElementById("associados").innerHTML =

"Erro ao carregar associados";


});








// CRIAR COBRANÇA


function criarCobranca(){



let emails = [];





document.querySelectorAll(".usuario")

.forEach(item=>{



    if(item.checked){


        emails.push(item.value);


    }



});






if(emails.length == 0){


    alert("Selecione pelo menos um associado");


    return;


}





let dados = {


acao:"criarCobranca",


emails:emails,


tipo:document.getElementById("tipo").value,


descricao:document.getElementById("descricao").value,


valor:Number(

document.getElementById("valor").value

)


};





if(

dados.tipo == "" ||

dados.descricao == "" ||

dados.valor <= 0

){


alert("Preencha todos os campos da cobrança");


return;


}





console.log("Enviando:",dados);






fetch(API,{


method:"POST",


body:JSON.stringify(dados)


})



.then(res=>res.json())



.then(retorno=>{



console.log(retorno);



document.getElementById("resultado").innerHTML = `


<div>


<strong>

${retorno.status}

</strong>


</div>


`;



alert(retorno.status);





})



.catch(erro=>{


console.log(erro);


alert("Erro ao criar cobrança");


});





}



</script>
  </body>

</html>
