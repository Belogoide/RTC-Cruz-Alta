<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin RTC</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1 class="titulo">
🧾 Admin RTC
</h1>



<div class="menu-admin">


<button class="botao" onclick="abrirAba('pagamentos')">

💰 Pagamentos

</button>


<button class="botao" onclick="abrirAba('associados')">

👥 Associados

</button>


<button class="botao" onclick="abrirAba('cobrancas')">

📄 Cobranças

</button>


</div>





<!-- PAGAMENTOS -->


<div id="pagamentos" class="aba">


<div class="lista">


<h3 style="color:#D61264;">

Pagamentos Pendentes

</h3>


<div id="listaPagamentos">

Carregando pagamentos...

</div>


</div>


</div>







<!-- ASSOCIADOS -->


<div id="associados" class="aba" style="display:none;">


<div class="lista">


<h3 style="color:#D61264;">

Associados

</h3>


<div id="listaAssociados">

Carregando associados...

</div>


</div>


</div>







<!-- COBRANCAS -->


<div id="cobrancas" class="aba" style="display:none;">


<div class="lista">


<h3 style="color:#D61264;">

Criar Cobrança

</h3>



<div id="selecionarAssociados">

Carregando associados...

</div>



<br>



<input 
id="tipo"
class="input"
placeholder="Tipo (Ex: Evento)">



<br><br>



<input 
id="descricao"
class="input"
placeholder="Descrição">



<br><br>



<input 
id="valor"
class="input"
type="number"
placeholder="Valor">



<br><br>



<button 
class="botao"
onclick="criarCobranca()">

Criar cobrança

</button>



</div>


</div>
<script>


const API = "https://script.google.com/macros/s/AKfycbzHAwc4EnLQzIsLAmq9dEYhZP5aQE3mPte-PP7E8TKQLF4I6S_fx_mqEHs_aectv1AMfg/exec";



// CONTROLE DAS ABAS

function abrirAba(nome){


document.querySelectorAll(".aba")

.forEach(aba=>{


aba.style.display="none";


});



document.getElementById(nome)

.style.display="block";



if(nome=="pagamentos"){

buscarPagamentos();

}



if(nome=="associados"){

buscarAssociados();

}



if(nome=="cobrancas"){

carregarAssociadosCobranca();

}



}







// =========================
// PAGAMENTOS
// =========================



function buscarPagamentos(){



const area = document.getElementById("listaPagamentos");



area.innerHTML="Carregando...";




fetch(API+"?tipo=pagamentos")

.then(res=>res.json())

.then(dados=>{



area.innerHTML="";



if(dados.length==0){



area.innerHTML=`

<div class="lista">

Nenhum pagamento pendente

</div>

`;

return;


}




dados.forEach(p=>{



area.innerHTML += `


<div class="lista">



<h3 style="color:#D61264;">

Pagamento PIX

</h3>




<p>

<strong>Email:</strong><br>

${p.email}

</p>



<p>

<strong>Itens:</strong><br>

${p.itens}

</p>



<p>

<strong>Valor:</strong><br>

R$ ${Number(p.valor)

.toFixed(2)

.replace(".",",")}

</p>




<p>

<strong>Status:</strong>

${p.status}

</p>



<button

class="botao"

onclick="aprovar(${p.linha})">

✅ Aprovar

</button>



<br><br>



<button

class="botao"

onclick="negar(${p.linha})">

❌ Negar

</button>




</div>



`;



});



})

.catch(erro=>{


console.log(erro);


area.innerHTML="Erro ao carregar pagamentos";


});



}








function aprovar(linha){



fetch(API,{


method:"POST",


body:JSON.stringify({


acao:"aprovar",


linha:linha


})


})



.then(res=>res.json())

.then(retorno=>{


alert(retorno.status);


buscarPagamentos();


});



}








function negar(linha){



fetch(API,{


method:"POST",


body:JSON.stringify({


acao:"negar",


linha:linha


})


})



.then(res=>res.json())

.then(retorno=>{


alert(retorno.status);


buscarPagamentos();


});



}









    // =========================
// ASSOCIADOS
// =========================


function buscarAssociados(){


const area = document.getElementById("listaAssociados");


area.innerHTML="Carregando associados...";



fetch(API+"?tipo=associados")


.then(res=>res.json())


.then(dados=>{



area.innerHTML="";



if(dados.length==0){


area.innerHTML="Nenhum associado encontrado";


return;


}



dados.forEach(a=>{


area.innerHTML += `


<div class="lista">


<strong>

${a.nome}

</strong>


<br>


Email:

${a.email}


<br>


Telefone:

${a.telefone}


<br>


Status:

${a.status}



</div>



`;



});



})

.catch(erro=>{


console.log(erro);


area.innerHTML="Erro ao carregar associados";


});



}









// =========================
// COBRANÇAS
// =========================



function carregarAssociadosCobranca(){



const area = document.getElementById("selecionarAssociados");



area.innerHTML="Carregando associados...";




fetch(API+"?tipo=associados")


.then(res=>res.json())


.then(dados=>{


area.innerHTML="";



dados.forEach(a=>{



area.innerHTML += `


<div>


<label>


<input

type="checkbox"

class="usuarioCobranca"

value="${a.email}"

>


<strong>

${a.nome}

</strong>


<br>


<small>

${a.email}

</small>


</label>



</div>


<br>


`;



});



})

.catch(erro=>{


console.log(erro);


area.innerHTML="Erro ao carregar associados";


});



}










function criarCobranca(){



let emails=[];




document.querySelectorAll(".usuarioCobranca")


.forEach(item=>{


if(item.checked){


emails.push(item.value);


}


});





if(emails.length==0){


alert("Selecione pelo menos um associado");


return;


}







let dados={


acao:"criarCobranca",


emails:emails,


tipo:document.getElementById("tipo").value,


descricao:document.getElementById("descricao").value,


valor:Number(

document.getElementById("valor").value

)


};






if(

dados.tipo=="" ||

dados.descricao=="" ||

dados.valor<=0

){


alert("Preencha os dados da cobrança");


return;


}






fetch(API,{


method:"POST",


body:JSON.stringify(dados)


})


.then(res=>res.json())


.then(retorno=>{



alert(retorno.status);



// limpa formulário


document.getElementById("tipo").value="";

document.getElementById("descricao").value="";

document.getElementById("valor").value="";



// remove seleção


document.querySelectorAll(".usuarioCobranca")

.forEach(item=>{

item.checked=false;

});



})



.catch(erro=>{


console.log(erro);


alert("Erro ao criar cobrança");


});



}
   



</script>


</div>


</body>

</html>
