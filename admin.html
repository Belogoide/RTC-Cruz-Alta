<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Administração - RTC Cruz Alta</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1 class="titulo">
🔐 Administração
</h1>


<div id="pagamentos">

<p style="color:white;text-align:center;">
Carregando pagamentos...
</p>


</div>


<a class="card" href="index.html">

⬅ Voltar

</a>


</div>



<script>


const API = "https://script.google.com/macros/s/AKfycbzHAwc4EnLQzIsLAmq9dEYhZP5aQE3mPte-PP7E8TKQLF4I6S_fx_mqEHs_aectv1AMfg/exec";



// Buscar pagamentos pendentes

fetch(API)

.then(res => res.json())

.then(dados => {


const area = document.getElementById("pagamentos");


area.innerHTML = "";



if(dados.length === 0){


area.innerHTML = `

<div class="lista">

<h3>
Nenhum pagamento pendente
</h3>

</div>

`;

return;

}



dados.forEach(p => {


area.innerHTML += `

<div class="lista">


<h3 style="color:#D61264">

${p.email}

</h3>


<p>

${p.itens}

</p>


<p>

Valor: R$ ${p.valor}

</p>


<p>

Status: ${p.status}

</p>



<button class="botao" onclick="aprovar(${p.linha})">

✅ Aprovar

</button>


</div>


`;


});


})

.catch(erro => {


document.getElementById("pagamentos").innerHTML = `

<div class="lista">

Erro ao carregar pagamentos

</div>

`;

console.log(erro);


});





function aprovar(linha){


fetch(API, {


method:"POST",


body: JSON.stringify({

acao:"aprovar",

linha:linha

})


})


.then(res => res.json())


.then(retorno => {


alert(retorno.status);


location.reload();


})


.catch(erro => {


console.log(erro);


alert("Erro ao aprovar pagamento");


});


}



</script>


</body>

</html>
