<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Tesouraria</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1 class="titulo">
🧾 Tesouraria Admin
</h1>



<div id="pagamentos">


<p style="color:white;text-align:center;">
Carregando pagamentos...
</p>


</div>



</div>



<script>


const API = "https://script.google.com/macros/s/AKfycbzHAwc4EnLQzIsLAmq9dEYhZP5aQE3mPte-PP7E8TKQLF4I6S_fx_mqEHs_aectv1AMfg/exec";



const area = document.getElementById("pagamentos");





fetch(API + "?tipo=pagamentos")

.then(res => res.json())

.then(dados => {



area.innerHTML = "";



if(dados.length == 0){


area.innerHTML = `


<div class="lista">


<h3>

Nenhum pagamento pendente

</h3>


</div>


`;


return;


}





dados.forEach(p=>{


area.innerHTML += `



<div class="lista">



<h3 style="color:#D61264;">

Pagamento PIX

</h3>



<p style="color:#333;">

<strong>Email:</strong><br>

${p.email}

</p>



<br>



<p style="color:#333;">

<strong>Itens:</strong><br>

${p.itens}

</p>



<br>



<p style="color:#333;">

<strong>Valor:</strong><br>

R$ ${Number(p.valor)
.toFixed(2)
.replace(".",",")}

</p>



<br>



<p style="color:#333;">

<strong>Status:</strong>

${p.status}

</p>



<br>



<button 

class="botao"

onclick="aprovar(${p.linha})">

✅ Aprovar pagamento

</button>



<br><br>



<button 

class="botao"

onclick="negar(${p.linha})">

❌ Negar pagamento

</button>



</div>



`;



});



})

.catch(erro=>{


console.log(erro);


area.innerHTML = `

<div class="lista">

Erro ao carregar pagamentos

</div>

`;


});








function aprovar(linha){



fetch(API,{


method:"POST",


body:JSON.stringify({


acao:"aprovar",


linha:linha


})


})



.then(res=>res.json())


.then(retorno=>{


alert(retorno.status);


location.reload();


})



.catch(erro=>{


console.log(erro);


alert("Erro ao aprovar pagamento");


});



}








function negar(linha){



fetch(API,{


method:"POST",


body:JSON.stringify({


acao:"negar",


linha:linha


})


})



.then(res=>res.json())


.then(retorno=>{


alert(retorno.status);


location.reload();


})



.catch(erro=>{


console.log(erro);


alert("Erro ao negar pagamento");


});



}



</script>



</body>

</html>
