<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Tesouraria</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1 class="titulo">
🧾 Admin Tesouraria
</h1>



<div id="pagamentos">

<p style="color:white;text-align:center;">
Carregando pagamentos...
</p>

</div>



</div>



<script>


const API = "https://script.google.com/macros/s/AKfycbzHAwc4EnLQzIsLAmq9dEYhZP5aQE3mPte-PP7E8TKQLF4I6S_fx_mqEHs_aectv1AMfg/exec";



const area = document.getElementById("pagamentos");



fetch(API + "?tipo=pagamentos")


.then(res=>res.json())


.then(dados=>{


area.innerHTML="";



if(dados.length == 0){


area.innerHTML=`

<div class="lista">

<h3>
Nenhum pagamento pendente
</h3>

</div>

`;


return;


}




dados.forEach(p=>{



area.innerHTML += `


<div class="lista">


<strong>

📧 ${p.email}

</strong>


<br><br>


<b>Itens:</b>

<br>

${p.itens}


<br><br>


<b>Valor:</b>

<br>

R$ ${Number(p.valor)
.toFixed(2)
.replace(".",",")}



<br><br>


<b>Status:</b>

${p.status}



<br><br>



<button class="botao" onclick="aprovar(${p.linha})">


✅ Aprovar pagamento


</button>



</div>



`;



});



})

.catch(erro=>{


console.log(erro);


area.innerHTML="Erro ao carregar pagamentos";


});







function aprovar(linha){



fetch(API,{


method:"POST",


body:JSON.stringify({


acao:"aprovar",


linha:linha



})


})


.then(res=>res.json())


.then(retorno=>{


alert(retorno.status);


location.reload();


})



.catch(erro=>{


console.log(erro);


alert("Erro ao aprovar pagamento");


});



}



</script>



</body>

</html>
